<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlante Digitale: Bunker della Guerra Fredda</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #mappa { width: 100vw; height: 100vh; }
        
        .cluster-custom {
            width: 3rem;
            height: 3rem;
            background-color: #34495e; 
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.5rem;
            color: #ffffff; 
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
            border: 2px solid #bdc3c7;
        }
    </style>
</head>
<body>

    <div id="mappa"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    
    <script src="dati.js"></script>
    
    <script>
        const map = L.map('mappa').setView([41.5, 12.5], 5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        const clusterGroup = L.markerClusterGroup({
            iconCreateFunction: function(cluster) {
                return L.divIcon({
                    html: '<div class="cluster-custom">' + cluster.getChildCount() + '</div>',
                    className: '',
                    iconSize: [48, 48]
                });
            }
        });

        sitiMilitari.forEach(sito => {
            const marker = L.marker([sito.lat, sito.lng]);
            
            const fotoHTML = sito.immagine ? `<img src="${sito.immagine}" style="width: 100%; border-radius: 4px; margin-bottom: 8px;">` : '';
            
            marker.bindPopup(`${fotoHTML}<h3 style="margin: 0 0 5px 0;">${sito.titolo}</h3><p style="margin: 0; font-size: 0.9rem;">${sito.info}</p>`, {
                maxWidth: 300 
            });
            
            clusterGroup.addLayer(marker);
        });

        map.addLayer(clusterGroup);
    </script>

</body>
</html>
